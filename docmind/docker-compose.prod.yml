version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: docmind-backend:latest
    container_name: docmind-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.production
    volumes:
      - docmind_uploads:/data/uploads
      - docmind_faiss:/data/faiss_index
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  docmind_uploads:
  docmind_faiss:
